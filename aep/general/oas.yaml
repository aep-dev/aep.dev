          name: body
          schema:
            $ref: '#/components/schemas/book'
        - in: query
          name: id
          required: true
          schema: {}
          type: string
      responses:
        '200':
          schema:
            $ref: '#/components/schemas/book'
  /publishers/{publisher_id}/books/{book_id}:
    delete:
