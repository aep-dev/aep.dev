components:
  schemas:
    book:
      properties:
        author:
          items:
            type: object
          type: array
        edition:
          format: int32
          type: integer
        id:
          readOnly: true
          type: string
          x-terraform-id: true
        isbn:
          items:
            type: string
          type: array
        path:
          readOnly: true
          type: string
        price:
          format: float
          type: number
        published:
          type: boolean
      required:
        - isbn
        - price
        - published
      type: object
      x-aep-resource:
        parents:
          - publisher
        patterns:
          - /publishers/{publisher_id}/books/{book_id}
        plural: books
        singular: book
    publisher:
      properties:
        description:
          type: string
        id:
          readOnly: true
          type: string
          x-terraform-id: true
        path:
          readOnly: true
          type: string
      type: object
      x-aep-resource:
        patterns:
          - /publishers/{publisher_id}
        plural: publishers
        singular: publisher
info:
  title: bookstore.example.com
  version: version not set
paths:
