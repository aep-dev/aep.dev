          name: publisher_id
          required: true
          schema: {}
          type: string
        - in: body
          name: body
          schema:
            $ref: '#/components/schemas/publisher'
      responses:
        '200':
          schema:
            $ref: '#/components/schemas/publisher'
    put:
      parameters:
